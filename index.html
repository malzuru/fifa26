<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 – Team Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b1120;
    --surface: #131c2e;
    --surface2: #1a2540;
    --border: #243050;
    --primary: #1a6fc4;
    --accent: #d42b3a;
    --gold: #e8c44a;
    --text: #eef2ff;
    --text-muted: #7a90b8;
    --group-A: #2d6a4f; --group-B: #1d3a8a; --group-C: #7b2d2d;
    --group-D: #4a2d7b; --group-E: #7b5e1a; --group-F: #1a6b6b;
    --group-G: #5c3d2e; --group-H: #2e5c3d; --group-I: #3d2e5c;
    --group-J: #5c2e3d; --group-K: #2e4a5c; --group-L: #4a5c2e;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(160deg, #0d1b35 0%, #1a2d50 60%, #0d1b35 100%);
    border-bottom: 2px solid var(--accent);
    padding: 28px 24px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(26,111,196,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1.1;
  }
  .header h1 span { color: var(--gold); }
  .header p {
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .tz-toggle-wrap {
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .tz-btn {
    background: none;
    border: none;
    border-radius: 999px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 5px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tz-btn.active {
    background: var(--primary);
    color: #fff;
  }
  .tz-btn:hover:not(.active) { color: var(--text); }

  /* ── Search area ── */
  .search-wrap {
    max-width: 680px;
    margin: 28px auto 0;
    padding: 0 16px;
  }
  .search-box {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .search-input-wrap {
    flex: 1;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    padding: 12px 14px 12px 42px;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--primary); }
  #searchInput::placeholder { color: var(--text-muted); }

  /* Autocomplete */
  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    max-height: 260px;
    overflow-y: auto;
  }
  .autocomplete-item {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    transition: background 0.12s;
  }
  .autocomplete-item:hover, .autocomplete-item.active {
    background: var(--primary);
  }
  .autocomplete-item .team-flag { font-size: 18px; }
  .autocomplete-item .team-name { font-weight: 600; }
  .autocomplete-item .team-code { color: var(--text-muted); font-size: 12px; margin-left: auto; }
  .autocomplete-item .group-tag {
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.12);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .clear-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    padding: 0 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: none;
  }
  .clear-btn.visible { display: flex; align-items: center; gap: 6px; }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── All-teams grid ── */
  .all-teams {
    max-width: 680px;
    margin: 16px auto 0;
    padding: 0 16px 32px;
  }
  .all-teams-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
  }
  .group-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .group-header {
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .group-teams {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .team-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-top: 1px solid var(--border);
    transition: background 0.12s;
  }
  .team-pill:hover { background: var(--surface2); }
  .team-pill .flag { font-size: 18px; }

  /* ── Team schedule view ── */
  .team-view {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 48px;
    display: none;
  }

  .team-hero {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
  }
  .team-hero-flag { font-size: 52px; line-height: 1; }
  .team-hero-info { flex: 1; }
  .team-hero-name {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }
  .team-hero-meta {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .tag-group { background: rgba(255,255,255,0.1); color: #fff; }
  .tag-host { background: rgba(232,196,74,0.18); color: var(--gold); }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .match-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s, transform 0.12s;
  }
  .match-card:hover {
    border-color: var(--primary);
    transform: translateY(-1px);
  }

  .match-meta-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .match-num { color: var(--text-muted); font-weight: 600; }
  .match-stage-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .badge-group { background: rgba(26,111,196,0.25); color: #7ab8f5; }
  .badge-r32 { background: rgba(139,92,246,0.25); color: #c4a8ff; }
  .badge-r16 { background: rgba(232,196,74,0.2); color: var(--gold); }
  .badge-qf { background: rgba(251,146,60,0.2); color: #fca36a; }
  .badge-sf { background: rgba(212,43,58,0.2); color: #f87171; }
  .badge-final { background: rgba(232,196,74,0.3); color: var(--gold); }
  .badge-3rd   { background: rgba(148,163,184,0.2); color: #cbd5e1; }

  /* Knockout round header */
  .ko-round-header {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 6px 0 10px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ko-round-header::after { content:''; flex:1; height:1px; background:var(--border); }
  .ko-round-header:first-child { margin-top: 0; }

  /* TBD team placeholder in match card */
  .match-team-tbd { font-size: 24px; line-height: 1; opacity: 0.4; }

  /* Full-schedule date headers */
  .schedule-date-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 20px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .schedule-date-header::after { content:''; flex:1; height:1px; background:var(--border); }
  .schedule-date-header:first-child { padding-top: 4px; }
  .schedule-date-header.today { color: var(--gold); }
  .schedule-date-header.today::after { background: rgba(232,196,74,0.3); }
  .today-pill {
    background: var(--gold);
    color: #0b1120;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  /* Phase divider between group stage and knockout */
  .schedule-phase-sep {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 28px 0 4px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }
  .schedule-phase-sep::before, .schedule-phase-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(232,196,74,0.3);
  }

  .match-body {
    display: flex;
    align-items: center;
    padding: 14px;
    gap: 12px;
  }
  .match-team {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }
  .match-team-flag { font-size: 28px; line-height: 1; }
  .match-team-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
  }
  .match-team-code { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .match-team.highlight .match-team-name { color: var(--gold); }

  .match-vs {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .vs-text {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .vs-time {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .vs-tz { font-size: 10px; color: var(--text-muted); font-weight: 600; }

  /* Score display for completed matches */
  .vs-score {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .vs-ft {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .match-card.finished { border-color: rgba(255,255,255,0.08); }
  .match-card.finished .match-team-name { color: var(--text-muted); }
  .match-card.finished .match-team.winner .match-team-name { color: #fff; font-weight: 800; }

  .match-footer {
    padding: 7px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
  }
  .match-day-badge {
    font-weight: 700;
    color: var(--text);
  }

  /* Knockout placeholder */
  .knockout-note {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 10px;
  }
  .knockout-note strong { color: var(--text); display: block; margin-bottom: 4px; }

  /* Group context */
  .group-context {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
  }
  .group-context-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .group-context-teams {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .gc-team {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
  }
  .gc-team:hover { border-color: var(--primary); }
  .gc-team.is-selected { border-color: var(--gold); background: rgba(232,196,74,0.1); }
  .gc-team .flag { font-size: 16px; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-size: 15px;
  }
  .no-results .emoji { font-size: 36px; display: block; margin-bottom: 12px; }

  /* Responsive */
  @media (max-width: 480px) {
    .groups-grid { grid-template-columns: 1fr; }
    .team-hero { flex-direction: column; text-align: center; }
    .team-hero-meta { justify-content: center; }
  }

  /* Broadcast badges */
  .broadcast-wrap { display: flex; gap: 5px; align-items: center; }
  .badge-fox  { background: #003366; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
  .badge-fs1  { background: #e8002d; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
  .badge-tubi { background: #5a14de; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Splash */
  .splash-hint {
    text-align: center;
    padding: 16px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ── View mode tabs ── */
  .view-tabs {
    max-width: 680px;
    margin: 16px auto 0;
    padding: 0 16px;
    display: flex;
  }
  .view-tabs-inner {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    width: 100%;
  }
  .view-tab {
    flex: 1;
    background: none;
    border: none;
    border-radius: 7px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .view-tab.active { background: var(--primary); color: #fff; }
  .view-tab:hover:not(.active) { color: var(--text); }

  /* ── Venue browser ── */
  .all-venues {
    max-width: 680px;
    margin: 16px auto 0;
    padding: 0 16px 32px;
  }
  .country-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .country-header {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    transition: background 0.12s;
  }
  .country-header:hover { background: rgba(255,255,255,0.08); }
  .country-header .match-count {
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .country-venues {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 14px;
  }
  .venue-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.12s;
  }
  .venue-pill:hover { border-color: var(--primary); color: var(--text); }
  .venue-pill .vc-count {
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--text-muted);
  }

  /* ── Venue match view ── */
  .venue-view {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 48px;
    display: none;
  }
  .venue-hero {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .venue-hero-flag { font-size: 40px; line-height: 1; }
  .venue-hero-info { flex: 1; }
  .venue-hero-name { font-size: 20px; font-weight: 800; line-height: 1; }
  .venue-hero-sub { margin-top: 5px; font-size: 13px; color: var(--text-muted); }
  .back-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--primary); color: var(--text); }

  /* ── Standings ── */
  .all-standings {
    max-width: 680px;
    margin: 16px auto 0;
    padding: 0 16px 48px;
  }
  .standings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .standings-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .standings-group-header {
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .standings-table thead th {
    padding: 5px 8px;
    color: var(--text-muted);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .standings-table thead th.th-team { text-align: left; }
  .standings-table tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }
  .standings-table tbody tr:last-child { border-bottom: none; }
  .standings-table tbody tr:hover { background: var(--surface2); }
  .standings-table td {
    padding: 7px 8px;
    text-align: center;
    color: var(--text-muted);
  }
  .standings-table td.td-team {
    text-align: left;
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .standings-table td.td-pos { font-weight: 700; color: var(--text-muted); width: 24px; }

// ── VENUE TIMEZONES (summer 2026) ─────────────────────────────────────────────
// Mexico abolished DST in 2023 → CST year-round (UTC-6 = ET-2)
// US Eastern cities: EDT (UTC-4 = ET±0)
// US Central cities: CDT (UTC-5 = ET-1)
// US/Canada Pacific cities: PDT (UTC-7 = ET-3)
const VENUE_TZ = {
  "Mexico City":           { offset: -2, label: "CST" },
  "Guadalajara":           { offset: -2, label: "CST" },
  "Monterrey":             { offset: -2, label: "CST" },
  "Toronto":               { offset:  0, label: "EDT" },
  "Atlanta":               { offset:  0, label: "EDT" },
  "Miami":                 { offset:  0, label: "EDT" },
  "Philadelphia":          { offset:  0, label: "EDT" },
  "New York / New Jersey": { offset:  0, label: "EDT" },
  "Boston":                { offset:  0, label: "EDT" },
  "Houston":               { offset: -1, label: "CDT" },
  "Dallas":                { offset: -1, label: "CDT" },
  "Kansas City":           { offset: -1, label: "CDT" },
  "Seattle":               { offset: -3, label: "PDT" },
  "Los Angeles":           { offset: -3, label: "PDT" },
  "San Francisco Bay Area":{ offset: -3, label: "PDT" },
  "Vancouver":             { offset: -3, label: "PDT" },
};

function getDisplayTime(match) {
  if (!showLocalTime) {
    return { time: match.time === "00:00" ? "Midnight" : match.time, tz: "ET" };
  }
  const tz = VENUE_TZ[match.venue] || { offset: 0, label: "ET" };
  const [hStr, mStr] = match.time.split(":");
  let h = parseInt(hStr) + tz.offset;
  const m = mStr;
  if (h < 0) h += 24;
  if (h >= 24) h -= 24;
  const localTime = `${String(h).padStart(2,'0')}:${m}`;
  return { time: localTime, tz: tz.label };
}

let SCORES = {}; // keyed by match id → { homeScore, awayScore, completed, detail }

// ── SCORES FETCH ──────────────────────────────────────────────────────────────
async function fetchScores() {
  const start = new Date('2026-06-11');
  const today = new Date();
  const dates = [];
  for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
    dates.push(d.toISOString().slice(0, 10).replace(/-/g, ''));
  }

  const results = await Promise.all(
    dates.map(date =>
      fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${date}`)
        .then(r => r.json())
        .catch(() => null)
    )
  );

  results.forEach(data => {
    if (!data || !data.events) return;
    data.events.forEach(event => {
      const parts = event.shortName.split(' @ ');
      if (parts.length !== 2) return;
      const [awayCode, homeCode] = parts;
      const match = MATCHES.find(m => m.home === homeCode && m.away === awayCode);
      if (!match) return;
      const comp = event.competitions[0];
      if (!comp || !comp.competitors) return;
      const home = comp.competitors.find(t => t.homeAway === 'home');
      const away = comp.competitors.find(t => t.homeAway === 'away');
      const completed = event.status.type.completed;
      const inProgress = event.status.type.state === 'in';
      if (!completed && !inProgress) return;
      SCORES[match.id] = {
        homeScore: home ? parseInt(home.score) || 0 : 0,
        awayScore: away ? parseInt(away.score) || 0 : 0,
        completed,
        inProgress,
        detail: event.status.type.shortDetail || 'FT',
      };
    });
  });
}

// ── STANDINGS COMPUTATION ─────────────────────────────────────────────────────
function computeStandings(group) {
  const teamCodes = Object.entries(TEAMS)
    .filter(([, t]) => t.group === group)
    .map(([code]) => code);

  const stats = {};
  teamCodes.forEach(code => {
    stats[code] = { p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 };
  });

  MATCHES.filter(m => m.group === group).forEach(m => {
    const score = SCORES[m.id];
    if (!score || !score.completed) return;
    const { homeScore: hg, awayScore: ag } = score;
    stats[m.home].p++; stats[m.away].p++;
    stats[m.home].gf += hg; stats[m.home].ga += ag;
    stats[m.away].gf += ag; stats[m.away].ga += hg;
    if (hg > ag)      { stats[m.home].w++; stats[m.home].pts += 3; stats[m.away].l++; }
    else if (hg < ag) { stats[m.away].w++; stats[m.away].pts += 3; stats[m.home].l++; }
    else              { stats[m.home].d++; stats[m.home].pts++; stats[m.away].d++; stats[m.away].pts++; }
  });

  return teamCodes
    .map(code => ({ code, ...stats[code], gd: stats[code].gf - stats[code].ga }))
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
}

function renderStandingsTable(group, highlightCode = null) {
  const rows = computeStandings(group);
  const color = GROUP_COLORS[group];

  const tbody = rows.map((r, i) => {
    const team = TEAMS[r.code];
    const advances = i < 2 ? 'advances advances-bar' : '';
    const selected = r.code === highlightCode ? 'is-selected' : '';
    const gd = r.gd > 0 ? `+${r.gd}` : r.gd;
    return `
      <tr class="${advances} ${selected}">
        <td class="td-pos">${i + 1}</td>
        <td class="td-team" onclick="selectTeam('${r.code}')">
          <span class="td-flag">${team.flag}</span>${team.name}
        </td>
        <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${r.gf}</td><td>${r.ga}</td><td>${gd}</td>
        <td class="td-pts">${r.pts}</td>
      </tr>`;
  }).join('');

  return `
    <div class="standings-card">
      <div class="standings-group-header" style="background:${color}22; color:#cde; border-bottom:1px solid ${color}44;">
        GROUP ${group}
      </div>
      <table class="standings-table">
        <thead>
          <tr>
            <th class="td-pos">#</th>
            <th class="th-team" colspan="1">Team</th>
            <th>P</th><th>W</th><th>D</th><th>L</th>
            <th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

function renderAllStandings(highlightCode = null) {
  const grid = document.getElementById('standingsGrid');
  grid.innerHTML = 'ABCDEFGHIJKL'.split('').map(g => {

      document.getElementById('allTeamsView').style.display = 'block';
    }
  } else if (mode === 'standings') {
    document.getElementById('allStandingsView').style.display = 'block';
    renderAllStandings(selectedTeam);

      const group = TEAMS[selectedTeam].group;

        if (el) {

  }
}

function allMatchesAtVenue(venue) {
  return [
    ...MATCHES.filter(m => m.venue === venue),
    ...KNOCKOUT_MATCHES.filter(m => m.venue === venue),
  ].sort((a, b) => a.id - b.id);
}

function allMatchesInCities(cities) {
  return [
    ...MATCHES.filter(m => cities.includes(m.venue)),
    ...KNOCKOUT_MATCHES.filter(m => cities.includes(m.venue)),
  ].sort((a, b) => a.id - b.id);
}

function renderVenueBrowser() {
  const grid = document.getElementById('countriesGrid');
  grid.innerHTML = Object.entries(VENUE_COUNTRIES).map(([country, data]) => {
    const countryCount = allMatchesInCities(data.cities).length;

      return `
        <div class="venue-pill" onclick="selectVenue('${city}')">

// ── Knockout card renderer ────────────────────────────────────────────────────
function renderKnockoutCard(m) {
  const stageLabel = KO_STAGE_LABELS[m.stage] || m.stage;
  const badgeClass = `badge-${m.stage}`;
  let displayTime, displayTZ;
  if (m.time === 'TBC') {
    displayTime = 'TBC'; displayTZ = '';
  } else {
    const dt = getDisplayTime(m);
    displayTime = dt.time; displayTZ = dt.tz;
  }
  const venueStr = m.venueTbc
    ? '📍 Venue TBC'
    : `📍 ${m.venue}${m.stadium ? ' · ' + m.stadium : ''}`;

  return `
    <div class="match-card">
      <div class="match-meta-bar" style="background:rgba(255,255,255,0.04);">
        <span class="match-num">Match #${m.id}</span>
        <span class="match-stage-badge ${badgeClass}">${stageLabel}</span>
      </div>
      <div class="match-body">
        <div class="match-team" style="text-align:center;">
          <span class="match-team-tbd">🏳️</span>
          <span class="match-team-name" style="color:var(--text-muted);">${m.homeLabel}</span>
        </div>
        <div class="match-vs">
          <span class="vs-text">vs</span>
          <span class="vs-time">${displayTime}</span>
          <span class="vs-tz">${displayTZ}</span>
        </div>
        <div class="match-team" style="text-align:center;">
          <span class="match-team-tbd">🏳️</span>
          <span class="match-team-name" style="color:var(--text-muted);">${m.awayLabel}</span>

      </div>

// ── Today's date string (matches format used in MATCHES array) ────────────────
function getTodayStr() {
  const now = new Date();
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()}`;
}

// ── Full chronological schedule ───────────────────────────────────────────────
function renderFullSchedule() {
  const el = document.getElementById('scheduleGroups');
  const todayStr = getTodayStr();

  // Group stage: group by date string (insertion order = chronological)
  const dateMap = new Map();
  MATCHES.forEach(m => {
    if (!dateMap.has(m.date)) dateMap.set(m.date, []);
    dateMap.get(m.date).push(m);
  });

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function parseDateStr(s) {
    const p = s.split(' ');
    return new Date(2026, MONTHS.indexOf(p[1]), parseInt(p[2]));
  }

  let html = [...dateMap.entries()]
    .sort(([a], [b]) => parseDateStr(a) - parseDateStr(b))
    .map(([date, matches]) => {
    const isToday = date === todayStr;
    return `
    <div class="schedule-date-header${isToday ? ' today' : ''}"${isToday ? ' id="today-anchor"' : ''}>${date}${isToday ? '<span class="today-pill">Today</span>' : ''}</div>
    ${matches.map(m => renderMatchCard(m, null)).join('')}
  `}).join('');

  // Phase separator
  html += `<div class="schedule-phase-sep">Knockout Stage</div>`;

  // Knockout rounds
  const koRounds = [
    { key:"r32",   label:"Round of 32",        dates:"Jun 28 – Jul 4" },
    { key:"r16",   label:"Round of 16",         dates:"Jul 4 – 7"      },
    { key:"qf",    label:"Quarter-finals",       dates:"Jul 9 – 11"     },
    { key:"sf",    label:"Semi-finals",          dates:"Jul 14 – 15"    },
    { key:"3rd",   label:"Third Place Play-off", dates:"Jul 18"         },
    { key:"final", label:"The Final",            dates:"Jul 19"         },
  ];
  html += koRounds.map(r => {
    const matches = KNOCKOUT_MATCHES.filter(m => m.stage === r.key);
    return `
      <div class="ko-round-header">${r.label}<span style="font-size:10px;font-weight:500;color:var(--text-muted);margin-left:6px;">${r.dates}</span></div>
      ${matches.map(m => renderKnockoutCard(m)).join('')}
    `;
  }).join('');

  el.innerHTML = html;
}

// ── Search / Autocomplete ─────────────────────────────────────────────────────
let acIndex = -1;

function onSearchInput(e) {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { hideAutocomplete(); return; }

  const matches = Object.entries(TEAMS).filter(([code, t]) =>
    t.name.toLowerCase().includes(q) || code.toLowerCase().includes(q)
  );

  if (!matches.length) { hideAutocomplete(); return; }

  acIndex = -1;
  const list = document.getElementById('autocompleteList');
  list.innerHTML = matches.map(([code, t]) => `
    <div class="autocomplete-item" data-code="${code}" onclick="selectTeam('${code}')">
      <span class="team-flag">${t.flag}</span>
      <span class="team-name">${t.name}</span>
      <span class="group-tag">Group ${t.group}</span>
      <span class="team-code">${code}</span>
    </div>
  `).join('');
  list.style.display = 'block';
}

function onSearchKeydown(e) {
  const list = document.getElementById('autocompleteList');
  const items = list.querySelectorAll('.autocomplete-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex+1, items.length-1); highlightAC(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex-1, 0); highlightAC(items); }
  else if (e.key === 'Enter' && acIndex >= 0) { items[acIndex].click(); }
  else if (e.key === 'Escape') { hideAutocomplete(); }
}

function highlightAC(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
  if (acIndex >= 0) items[acIndex].scrollIntoView({ block: 'nearest' });
}

function hideAutocomplete() {
  document.getElementById('autocompleteList').style.display = 'none';
}

// ── Select team ───────────────────────────────────────────────────────────────
function selectTeam(code) {
  hideAutocomplete();
  selectedTeam = code;
  selectedVenue = null;
  const team = TEAMS[code];
  document.getElementById('searchInput').value = team.name;
  document.getElementById('clearBtn').classList.add('visible');
  ['allScheduleView','allTeamsView','allVenuesView','venueView'].forEach(
    id => document.getElementById(id).style.display = 'none'
  );
  document.getElementById('teamView').style.display = 'block';
  renderTeamView(code);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearSelection() {
  selectedTeam = null;
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('teamView').style.display = 'none';
  if (currentMode === 'teams') {
    document.getElementById('allTeamsView').style.display = 'block';
  } else {
    currentMode = 'all';
    document.getElementById('tabAll').classList.add('active');
    document.getElementById('tabTeams').classList.remove('active');
    document.getElementById('allScheduleView').style.display = 'block';
  }
}

// ── Render team view ──────────────────────────────────────────────────────────
function renderTeamView(code) {
  const team = TEAMS[code];
  const group = team.group;
  const color = GROUP_COLORS[group];

  // Hero
  const heroEl = document.getElementById('teamHero');
  heroEl.style.borderColor = color;
  heroEl.style.background = `linear-gradient(135deg, ${color}22 0%, var(--surface) 60%)`;
  heroEl.innerHTML = `
    <div class="team-hero-flag">${team.flag}</div>
    <div class="team-hero-info">
      <div class="team-hero-name">${team.name}</div>
      <div class="team-hero-meta">
        <span class="tag tag-group" style="background:${color}44; color:#ddd;">Group ${group}</span>
        ${team.host ? '<span class="tag tag-host">🏟️ Host Nation</span>' : ''}
      </div>
    </div>
  `;

  // Group context — standings table
  document.getElementById('groupContext').innerHTML = renderStandingsTable(group, code);

  // Group matches for this team
  const teamMatches = MATCHES.filter(m => m.home === code || m.away === code).sort((a,b)=>a.id-b.id);
  const gmEl = document.getElementById('groupMatches');
  gmEl.innerHTML = teamMatches.map(m => renderMatchCard(m, code)).join('');

  // Knockout section — show all rounds
  const koRounds = [
    { key:"r32", label:"Round of 32", dates:"Jun 28 – Jul 4" },
    { key:"r16", label:"Round of 16", dates:"Jul 4 – 7" },
    { key:"qf",  label:"Quarter-finals", dates:"Jul 9 – 11" },
    { key:"sf",  label:"Semi-finals", dates:"Jul 14 – 15" },
    { key:"3rd", label:"Third Place Play-off", dates:"Jul 18" },
    { key:"final", label:"The Final", dates:"Jul 19" },
  ];
  document.getElementById('knockoutInfo').innerHTML = koRounds.map(r => {
    const matches = KNOCKOUT_MATCHES.filter(m => m.stage === r.key);
    return `
      <div class="ko-round-header">${r.label} <span style="font-size:10px;font-weight:500;color:var(--text-muted);margin-left:4px;">${r.dates}</span></div>
      ${matches.map(m => renderKnockoutCard(m)).join('')}
    `;
  }).join('');
}

function renderMatchCard(m, highlightCode) {
  const home = TEAMS[m.home];
  const away = TEAMS[m.away];
  const mdLabel = `Matchday ${m.matchday}`;
  const color = GROUP_COLORS[m.group];
  const score = SCORES[m.id];

  const { time: displayTime, tz: displayTZ } = getDisplayTime(m);

  let vsHtml;
  if (score && (score.completed || score.inProgress)) {
    const homeWin = score.homeScore > score.awayScore;
    const awayWin = score.awayScore > score.homeScore;
    const detailColor = score.inProgress ? '#f87171' : 'var(--text-muted)';
    vsHtml = `
      <div class="match-vs">
        <span class="vs-score">${score.homeScore} – ${score.awayScore}</span>
        <span class="vs-ft" style="color:${detailColor};">${score.detail}</span>
      </div>`;
    const homeClass = `match-team ${m.home===highlightCode?'highlight':''} ${score.completed && homeWin?'winner':''}`;
    const awayClass = `match-team ${m.away===highlightCode?'highlight':''} ${score.completed && awayWin?'winner':''}`;
    return `
      <div class="match-card finished">
        <div class="match-meta-bar" style="background:${color}18;">
          <span class="match-num">Match #${m.id} · ${mdLabel}</span>
          <span class="match-stage-badge badge-group">Group ${m.group}</span>
        </div>
        <div class="match-body">
          <div class="${homeClass}">
            <span class="match-team-flag">${home.flag}</span>
            <span class="match-team-name">${home.name}</span>
            <span class="match-team-code">${m.home}</span>
          </div>
          ${vsHtml}
          <div class="${awayClass}">
            <span class="match-team-flag">${away.flag}</span>
            <span class="match-team-name">${away.name}</span>
            <span class="match-team-code">${m.away}</span>
          </div>
        </div>
        <div class="match-footer">
          <span>📅 ${m.date} &nbsp;·&nbsp; 📍 ${m.venue}</span>
          <div class="broadcast-wrap">
            <span class="badge-${m.broadcast === 'FOX' ? 'fox' : 'fs1'}">${m.broadcast}</span>
            ${m.tubi ? '<span class="badge-tubi">Tubi</span>' : ''}
          </div>
        </div>
      </div>`;
  }

  return `
    <div class="match-card">
      <div class="match-meta-bar" style="background:${color}18;">
        <span class="match-num">Match #${m.id} · ${mdLabel}</span>
        <span class="match-stage-badge badge-group">Group ${m.group}</span>
      </div>
      <div class="match-body">
        <div class="match-team ${m.home===highlightCode?'highlight':''}">
          <span class="match-team-flag">${home.flag}</span>
          <span class="match-team-name">${home.name}</span>
          <span class="match-team-code">${m.home}</span>
        </div>
        <div class="match-vs">
          <span class="vs-text">vs</span>
          <span class="vs-time">${displayTime}</span>
          <span class="vs-tz">${displayTZ}</span>
        </div>
        <div class="match-team ${m.away===highlightCode?'highlight':''}">
          <span class="match-team-flag">${away.flag}</span>
          <span class="match-team-name">${away.name}</span>
          <span class="match-team-code">${m.away}</span>
        </div>
      </div>
      <div class="match-footer">
        <span>📅 ${m.date} &nbsp;·&nbsp; 📍 ${m.venue}</span>
        <div class="broadcast-wrap">
          <span class="badge-${m.broadcast === 'FOX' ? 'fox' : 'fs1'}">${m.broadcast}</span>
          ${m.tubi ? '<span class="badge-tubi">Tubi</span>' : ''}
        </div>
      </div>
    </div>
  `;
}

init();
</script>
</body>
</html>
