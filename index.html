<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 – Team Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b1120;
    --surface: #131c2e;
    --surface2: #1a2540;
    --border: #243050;
    --primary: #1a6fc4;
    --accent: #d42b3a;
    --gold: #e8c44a;
    --text: #eef2ff;
    --text-muted: #7a90b8;
    --group-A: #2d6a4f; --group-B: #1d3a8a; --group-C: #7b2d2d;
    --group-D: #4a2d7b; --group-E: #7b5e1a; --group-F: #1a6b6b;
    --group-G: #5c3d2e; --group-H: #2e5c3d; --group-I: #3d2e5c;
    --group-J: #5c2e3d; --group-K: #2e4a5c; --group-L: #4a5c2e;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(160deg, #0d1b35 0%, #1a2d50 60%, #0d1b35 100%);
    border-bottom: 2px solid var(--accent);
    padding: 28px 24px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(26,111,196,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1.1;
  }
  .header h1 span { color: var(--gold); }
  .header p {
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .tz-toggle-wrap {
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .tz-btn {
    background: none;
    border: none;
    border-radius: 999px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 5px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tz-btn.active {
    background: var(--primary);
    color: #fff;
  }
  .tz-btn:hover:not(.active) { color: var(--text); }

  /* ── Search area ── */
  .search-wrap {
    max-width: 680px;
    margin: 28px auto 0;
    padding: 0 16px;
  }
  .search-box {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .search-input-wrap {
    flex: 1;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    padding: 12px 14px 12px 42px;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--primary); }
  #searchInput::placeholder { color: var(--text-muted); }

  /* Autocomplete */
  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    max-height: 260px;
    overflow-y: auto;
  }
  .autocomplete-item {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    transition: background 0.12s;
  }
  .autocomplete-item:hover, .autocomplete-item.active {
    background: var(--primary);
  }
  .autocomplete-item .team-flag { font-size: 18px; }
  .autocomplete-item .team-name { font-weight: 600; }
  .autocomplete-item .team-code { color: var(--text-muted); font-size: 12px; margin-left: auto; }
  .autocomplete-item .group-tag {
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.12);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .clear-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    padding: 0 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: none;
  }
  .clear-btn.visible { display: flex; align-items: center; gap: 6px; }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── All-teams grid ── */
  .all-teams {
    max-width: 680px;
    margin: 16px auto 0;
    padding: 0 16px 32px;
  }
  .all-teams-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
  }
  .group-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .group-header {
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .group-teams {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .team-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-top: 1px solid var(--border);
    transition: background 0.12s;
  }
  .team-pill:hover { background: var(--surface2); }
  .team-pill .flag { font-size: 18px; }

  /* ── Team schedule view ── */
  .team-view {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 48px;
    display: none;
  }

  .team-hero {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
  }
  .team-hero-flag { font-size: 52px; line-height: 1; }
  .team-hero-info { flex: 1; }
  .team-hero-name {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }
  .team-hero-meta {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .tag-group { background: rgba(255,255,255,0.1); color: #fff; }
  .tag-host { background: rgba(232,196,74,0.18); color: var(--gold); }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .match-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s, transform 0.12s;
  }
  .match-card:hover {
    border-color: var(--primary);
    transform: translateY(-1px);
  }

  .match-meta-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .match-num { color: var(--text-muted); font-weight: 600; }
  .match-stage-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .badge-group { background: rgba(26,111,196,0.25); color: #7ab8f5; }
  .badge-r32 { background: rgba(139,92,246,0.25); color: #c4a8ff; }
  .badge-r16 { background: rgba(232,196,74,0.2); color: var(--gold); }
  .badge-qf { background: rgba(251,146,60,0.2); color: #fca36a; }
  .badge-sf { background: rgba(212,43,58,0.2); color: #f87171; }
  .badge-final { background: rgba(232,196,74,0.3); color: var(--gold); }

  .match-body {
    display: flex;
    align-items: center;
    padding: 14px;
    gap: 12px;
  }
  .match-team {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }
  .match-team-flag { font-size: 28px; line-height: 1; }
  .match-team-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
  }
  .match-team-code { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .match-team.highlight .match-team-name { color: var(--gold); }

  .match-vs {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .vs-text {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .vs-time {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .vs-tz { font-size: 10px; color: var(--text-muted); font-weight: 600; }

  .match-footer {
    padding: 7px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
  }
  .match-day-badge {
    font-weight: 700;
    color: var(--text);
  }

  /* Knockout placeholder */
  .knockout-note {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 10px;
  }
  .knockout-note strong { color: var(--text); display: block; margin-bottom: 4px; }

  /* Group context */
  .group-context {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
  }
  .group-context-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .group-context-teams {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .gc-team {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
  }
  .gc-team:hover { border-color: var(--primary); }
  .gc-team.is-selected { border-color: var(--gold); background: rgba(232,196,74,0.1); }
  .gc-team .flag { font-size: 16px; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-size: 15px;
  }
  .no-results .emoji { font-size: 36px; display: block; margin-bottom: 12px; }

  /* Responsive */
  @media (max-width: 480px) {
    .groups-grid { grid-template-columns: 1fr; }
    .team-hero { flex-direction: column; text-align: center; }
    .team-hero-meta { justify-content: center; }
  }

  /* Broadcast badges */
  .broadcast-wrap { display: flex; gap: 5px; align-items: center; }
  .badge-fox  { background: #003366; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
  .badge-fs1  { background: #e8002d; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
  .badge-tubi { background: #5a14de; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Splash */
  .splash-hint {
    text-align: center;
    padding: 16px;
    color: var(--text-muted);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">Official Schedule • Subject to Change</div>
  <h1>FIFA World Cup <span>2026™</span></h1>
  <p>June 11 – July 19, 2026</p>
  <div class="tz-toggle-wrap">
    <button class="tz-btn active" id="btnET"  onclick="setTZ('ET')">ET</button>
    <button class="tz-btn"        id="btnLocal" onclick="setTZ('local')">Local time</button>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <div class="search-input-wrap">
      <span class="search-icon">⚽</span>
      <input type="text" id="searchInput" placeholder="Search by country name or code…" autocomplete="off" />
      <div class="autocomplete-list" id="autocompleteList" style="display:none;"></div>
    </div>
    <button class="clear-btn" id="clearBtn" onclick="clearSelection()">✕ Clear</button>
  </div>
</div>

<div class="all-teams" id="allTeamsView">
  <div class="splash-hint">Click any team or type above to view their full schedule</div>
  <div class="groups-grid" id="groupsGrid"></div>
</div>

<div class="team-view" id="teamView">
  <div class="team-hero" id="teamHero"></div>
  <div class="group-context" id="groupContext"></div>
  <div class="section-label">Group Stage</div>
  <div id="groupMatches"></div>
  <div class="section-label" style="margin-top:24px;">Knockout Stage</div>
  <div id="knockoutInfo"></div>
</div>

  E:"#7b5e1a", F:"#1a6b6b", G:"#5c3d2e", H:"#2e5c3d",

// ── VENUE TIMEZONES (summer 2026) ─────────────────────────────────────────────
// Mexico abolished DST in 2023 → CST year-round (UTC-6 = ET-2)
// US Eastern cities: EDT (UTC-4 = ET±0)
// US Central cities: CDT (UTC-5 = ET-1)
// US/Canada Pacific cities: PDT (UTC-7 = ET-3)
const VENUE_TZ = {
  "Mexico City":           { offset: -2, label: "CST" },
  "Guadalajara":           { offset: -2, label: "CST" },
  "Monterrey":             { offset: -2, label: "CST" },
  "Toronto":               { offset:  0, label: "EDT" },
  "Atlanta":               { offset:  0, label: "EDT" },
  "Miami":                 { offset:  0, label: "EDT" },
  "Philadelphia":          { offset:  0, label: "EDT" },
  "New York / New Jersey": { offset:  0, label: "EDT" },
  "Boston":                { offset:  0, label: "EDT" },
  "Houston":               { offset: -1, label: "CDT" },
  "Dallas":                { offset: -1, label: "CDT" },
  "Kansas City":           { offset: -1, label: "CDT" },
  "Seattle":               { offset: -3, label: "PDT" },
  "Los Angeles":           { offset: -3, label: "PDT" },
  "San Francisco Bay Area":{ offset: -3, label: "PDT" },
  "Vancouver":             { offset: -3, label: "PDT" },
};

function getDisplayTime(match) {
  if (!showLocalTime) {
    return { time: match.time === "00:00" ? "Midnight" : match.time, tz: "ET" };
  }
  const tz = VENUE_TZ[match.venue] || { offset: 0, label: "ET" };
  const [hStr, mStr] = match.time.split(":");
  let h = parseInt(hStr) + tz.offset;
  const m = mStr;
  if (h < 0) h += 24;
  if (h >= 24) h -= 24;
  const localTime = `${String(h).padStart(2,'0')}:${m}`;
  return { time: localTime, tz: tz.label };
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let selectedTeam = null;
let showLocalTime = false;

// ── TIMEZONE TOGGLE ───────────────────────────────────────────────────────────
function setTZ(mode) {
  showLocalTime = (mode === 'local');
  document.getElementById('btnET').classList.toggle('active', !showLocalTime);
  document.getElementById('btnLocal').classList.toggle('active', showLocalTime);
  // Re-render if a team is selected
  if (selectedTeam) renderTeamView(selectedTeam);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  renderGroupsGrid();

  const inp = document.getElementById('searchInput');
  inp.addEventListener('input', onSearchInput);
  inp.addEventListener('keydown', onSearchKeydown);
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-input-wrap')) hideAutocomplete();
  });
}

// ── Groups grid ───────────────────────────────────────────────────────────────
function renderGroupsGrid() {
  const grid = document.getElementById('groupsGrid');
  const groups = 'ABCDEFGHIJKL'.split('');
  grid.innerHTML = groups.map(g => {
    const teams = Object.entries(TEAMS).filter(([,t]) => t.group === g);
    const color = GROUP_COLORS[g];
    return `
      <div class="group-card">
        <div class="group-header" style="background:${color}22; color:${color === '#1a6b6b' ? '#5fd' : '#cde'}; border-bottom:1px solid ${color}44;">
          GROUP ${g}
        </div>
        <div class="group-teams">
          ${teams.map(([code, t]) => `
            <div class="team-pill" onclick="selectTeam('${code}')">
              <span class="flag">${t.flag}</span>
              <span>${t.name}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
  }).join('');
}

// ── Search / Autocomplete ─────────────────────────────────────────────────────
let acIndex = -1;

function onSearchInput(e) {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { hideAutocomplete(); return; }

  const matches = Object.entries(TEAMS).filter(([code, t]) =>
    t.name.toLowerCase().includes(q) || code.toLowerCase().includes(q)
  );

  if (!matches.length) { hideAutocomplete(); return; }

  acIndex = -1;
  const list = document.getElementById('autocompleteList');
  list.innerHTML = matches.map(([code, t]) => `
    <div class="autocomplete-item" data-code="${code}" onclick="selectTeam('${code}')">
      <span class="team-flag">${t.flag}</span>
      <span class="team-name">${t.name}</span>
      <span class="group-tag">Group ${t.group}</span>
      <span class="team-code">${code}</span>
    </div>
  `).join('');
  list.style.display = 'block';
}

function onSearchKeydown(e) {
  const list = document.getElementById('autocompleteList');
  const items = list.querySelectorAll('.autocomplete-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex+1, items.length-1); highlightAC(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex-1, 0); highlightAC(items); }
  else if (e.key === 'Enter' && acIndex >= 0) { items[acIndex].click(); }
  else if (e.key === 'Escape') { hideAutocomplete(); }
}

function highlightAC(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
  if (acIndex >= 0) items[acIndex].scrollIntoView({ block: 'nearest' });
}

function hideAutocomplete() {
  document.getElementById('autocompleteList').style.display = 'none';
}

// ── Select team ───────────────────────────────────────────────────────────────
function selectTeam(code) {
  hideAutocomplete();
  selectedTeam = code;
  const team = TEAMS[code];
  document.getElementById('searchInput').value = team.name;
  document.getElementById('clearBtn').classList.add('visible');
  document.getElementById('allTeamsView').style.display = 'none';
  document.getElementById('teamView').style.display = 'block';
  renderTeamView(code);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearSelection() {
  selectedTeam = null;
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('allTeamsView').style.display = 'block';
  document.getElementById('teamView').style.display = 'none';
}

// ── Render team view ──────────────────────────────────────────────────────────
function renderTeamView(code) {
  const team = TEAMS[code];
  const group = team.group;
  const color = GROUP_COLORS[group];

  // Hero
  const heroEl = document.getElementById('teamHero');
  heroEl.style.borderColor = color;
  heroEl.style.background = `linear-gradient(135deg, ${color}22 0%, var(--surface) 60%)`;
  heroEl.innerHTML = `
    <div class="team-hero-flag">${team.flag}</div>
    <div class="team-hero-info">
      <div class="team-hero-name">${team.name}</div>
      <div class="team-hero-meta">
        <span class="tag tag-group" style="background:${color}44; color:#ddd;">Group ${group}</span>
        ${team.host ? '<span class="tag tag-host">🏟️ Host Nation</span>' : ''}
      </div>
    </div>
  `;

  // Group context
  const groupTeams = Object.entries(TEAMS).filter(([,t]) => t.group === group);
  document.getElementById('groupContext').innerHTML = `
    <div class="group-context-title">Group ${group} · All Teams</div>
    <div class="group-context-teams">
      ${groupTeams.map(([c, t]) => `
        <div class="gc-team ${c===code?'is-selected':''}" onclick="selectTeam('${c}')">
          <span class="flag">${t.flag}</span>
          <span>${t.name}</span>
        </div>
      `).join('')}
    </div>
  `;

  // Group matches for this team
  const teamMatches = MATCHES.filter(m => m.home === code || m.away === code).sort((a,b)=>a.id-b.id);
  const gmEl = document.getElementById('groupMatches');
  gmEl.innerHTML = teamMatches.map(m => renderMatchCard(m, code)).join('');

  // Knockout note
  document.getElementById('knockoutInfo').innerHTML = `
    <div class="knockout-note">
      <strong>Round of 32 · Jun 28 – Jul 3</strong>
      Matchups are determined by group finishes. 16 matches across all host cities.
    </div>
    <div class="knockout-note" style="margin-top:8px;">
      <strong>Round of 16 · Jul 4–7 &nbsp;|&nbsp; Quarterfinals · Jul 9–11</strong>
      Fixtures are confirmed once earlier rounds conclude.
    </div>
    <div class="knockout-note" style="margin-top:8px;">
      <strong>Semifinals · Jul 14–15 &nbsp;|&nbsp; Bronze Final · Jul 18</strong>
      <span style="color:var(--text-muted);">Semifinals at Dallas (Jul 14, 15:00 ET) and Atlanta (Jul 15, 15:00 ET)</span>
    </div>
    <div class="knockout-note" style="margin-top:8px; border-color: var(--gold); background: rgba(232,196,74,0.06);">
      <strong style="color:var(--gold);">🏆 The Final · Sun Jul 19 · 15:00 ET</strong>
      New York / New Jersey Stadium (MetLife) · East Rutherford, NJ
    </div>
  `;
}

function renderMatchCard(m, highlightCode) {
  const home = TEAMS[m.home];
  const away = TEAMS[m.away];
  const mdLabel = `Matchday ${m.matchday}`;
  const color = GROUP_COLORS[m.group];

  const { time: displayTime, tz: displayTZ } = getDisplayTime(m);
  return `
    <div class="match-card">
      <div class="match-meta-bar" style="background:${color}18;">
        <span class="match-num">Match #${m.id} · ${mdLabel}</span>
        <span class="match-stage-badge badge-group">Group ${m.group}</span>
      </div>
      <div class="match-body">
        <div class="match-team ${m.home===highlightCode?'highlight':''}">
          <span class="match-team-flag">${home.flag}</span>
          <span class="match-team-name">${home.name}</span>
          <span class="match-team-code">${m.home}</span>
        </div>
        <div class="match-vs">
          <span class="vs-text">vs</span>
          <span class="vs-time">${displayTime}</span>
          <span class="vs-tz">${displayTZ}</span>
        </div>
        <div class="match-team ${m.away===highlightCode?'highlight':''}">
          <span class="match-team-flag">${away.flag}</span>
          <span class="match-team-name">${away.name}</span>
          <span class="match-team-code">${m.away}</span>
        </div>
      </div>
      <div class="match-footer">
        <span>📅 ${m.date} &nbsp;·&nbsp; 📍 ${m.venue}</span>
        <div class="broadcast-wrap">
          <span class="badge-${m.broadcast === 'FOX' ? 'fox' : 'fs1'}">${m.broadcast}</span>
          ${m.tubi ? '<span class="badge-tubi">Tubi</span>' : ''}
        </div>
      </div>
    </div>
  `;
}
