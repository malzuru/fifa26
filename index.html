<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 – Team Schedule</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b1120;
    --surface: #131c2e;
    --surface2: #1a2540;
    --border: #243050;
    --primary: #1a6fc4;
    --accent: #d42b3a;
    --gold: #e8c44a;
    --text: #eef2ff;
    --text-muted: #7a90b8;
    --group-A: #2d6a4f; --group-B: #1d3a8a; --group-C: #7b2d2d;
    --group-D: #4a2d7b; --group-E: #7b5e1a; --group-F: #1a6b6b;
    --group-G: #5c3d2e; --group-H: #2e5c3d; --group-I: #3d2e5c;
    --group-J: #5c2e3d; --group-K: #2e4a5c; --group-L: #4a5c2e;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(160deg, #0d1b35 0%, #1a2d50 60%, #0d1b35 100%);
    border-bottom: 2px solid var(--accent);
    padding: 28px 24px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(26,111,196,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1.1;
  }
  .header h1 span { color: var(--gold); }
  .header p {
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .tz-toggle-wrap {
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .tz-btn {
    background: none;
    border: none;
    border-radius: 999px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 5px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tz-btn.active {
    background: var(--primary);
    color: #fff;
  }
  .tz-btn:hover:not(.active) { color: var(--text); }

  .search-wrap {
    max-width: 680px;
    margin: 28px auto 0;
    padding: 0 16px;
  }
  .search-box {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .search-input-wrap {
    flex: 1;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    padding: 12px 14px 12px 42px;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--primary); }
  #searchInput::placeholder { color: var(--text-muted); }

  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    max-height: 260px;
    overflow-y: auto;
  }
  .autocomplete-item {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    transition: background 0.12s;
  }
  .autocomplete-item:hover, .autocomplete-item.active {
    background: var(--primary);
  }
  .autocomplete-item .team-flag { font-size: 18px; }
  .autocomplete-item .team-name { font-weight: 600; }
  .autocomplete-item .team-code { color: var(--text-muted); font-size: 12px; margin-left: auto; }
  .autocomplete-item .group-tag {
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.12);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .clear-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    padding: 0 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: none;
  }
  .clear-btn.visible { display: flex; align-items: center; gap: 6px; }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  .all-teams {
    max-width: 680px;
    margin: 16px auto 0;
    padding: 0 16px 32px;
  }
  .all-teams-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
  }
  .group-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .group-header {
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .group-teams {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .team-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-top: 1px solid var(--border);
    transition: background 0.12s;
  }
  .team-pill:hover { background: var(--surface2); }
  .team-pill .flag { font-size: 18px; }

  .team-view {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 48px;
    display: none;
  }

  .team-hero {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
  }
  .team-hero-flag { font-size: 52px; line-height: 1; }
  .team-hero-info { flex: 1; }
  .team-hero-name {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }
  .team-hero-meta {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .tag-group { background: rgba(255,255,255,0.1); color: #fff; }
  .tag-host { background: rgba(232,196,74,0.18); color: var(--gold); }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .match-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s, transform 0.12s;
  }
  .match-card:hover {
    border-color: var(--primary);
    transform: translateY(-1px);
  }

  .match-meta-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .match-num { color: var(--text-muted); font-weight: 600; }
  .match-stage-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .badge-group { background: rgba(26,111,196,0.25); color: #7ab8f5; }
  .badge-r32 { background: rgba(139,92,246,0.25); color: #c4a8ff; }
  .badge-r16 { background: rgba(232,196,74,0.2); color: var(--gold); }
  .badge-qf { background: rgba(251,146,60,0.2); color: #fca36a; }
  .badge-sf { background: rgba(212,43,58,0.2); color: #f87171; }
  .badge-final { background: rgba(232,196,74,0.3); color: var(--gold); }
  .badge-3rd   { background: rgba(148,163,184,0.2); color: #cbd5e1; }

  .ko-round-header {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 6px 0 10px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ko-round-header::after { content:''; flex:1; height:1px; background:var(--border); }
  .ko-round-header:first-child { margin-top: 0; }

  .match-team-tbd { font-size: 24px; line-height: 1; opacity: 0.4; }

  .schedule-date-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 20px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .schedule-date-header::after { content:''; flex:1; height:1px; background:var(--border); }
  .schedule-date-header:first-child { padding-top: 4px; }
  .schedule-date-header.today { color: var(--gold); }
  .schedule-date-header.today::after { background: rgba(232,196,74,0.3); }
  .today-pill {
    background: var(--gold);
    color: #0b1120;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .schedule-phase-sep {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 28px 0 4px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }
  .schedule-phase-sep::before, .schedule-phase-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(232,196,74,0.3);
  }

  .match-body {
    display: flex;
    align-items: center;
    padding: 14px;
    gap: 12px;
  }
  .match-team {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }
  .match-team-flag { font-size: 28px; line-height: 1; }
  .match-team-name {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
  }
  .match-team-code { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .match-team.highlight .match-team-name { color: var(--gold); }

  .match-vs {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .vs-text {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .vs-time {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .vs-tz { font-size: 10px; color: var(--text-muted); font-weight: 600; }

  .vs-score {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }
  .vs-ft {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .match-card.finished { border-color: rgba(255,255,255,0.08); }
  .match-card.finished .match-team-name { color: var(--text-muted); }
  .match-card.finished .match-team.winner .match-team-name { color: #fff; font-weight: 800; }

  .match-footer {
    padding: 7px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
  }
  .match-day-badge {
    font-weight: 700;
    color: var(--text);
  }

  .knockout-note {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 10px;
  }
  .knockout-note strong { color: var(--text); display: block; margin-bottom: 4px; }

  .group-context {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
  }
  .group-context-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .group-context-teams {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .gc-team {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.12s;
  }
  .gc-team:hover { border-color: var(--primary); }
  .gc-team.is-selected { border-color: var(--gold); background: rgba(232,196,74,0.1); }
  .gc-team .flag { font-size: 16px; }

  .no-results {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-size: 15px;
  }
  .no-results .emoji { font-size: 36px; display: block; margin-bottom: 12px; }

  @media (max-width: 480px) {
    .groups-grid { grid-template-columns: 1fr; }
    .team-hero { flex-direction: column; text-align: center; }
    .team-hero-meta { justify-content: center; }
  }

  .broadcast-wrap { display: flex; gap: 5px; align-items: center; }
  .badge-fox  { background: #003366; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
  .badge-fs1  { background: #e8002d; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
  .badge-tubi { background: #5a14de; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .splash-hint {
    text-align: center;
    padding: 16px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .view-tabs {
    max-width: 680px;
    margin: 16px auto 0;
    padding: 0 16px;
    display: flex;
  }
  .view-tabs-inner {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    width: 100%;
  }
  .view-tab {
    flex: 1;
    background: none;
    border: none;
    border-radius: 7px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .view-tab.active { background: var(--primary); color: #fff; }
  .view-tab:hover:not(.active) { color: var(--text); }

  .all-venues {
    max-width: 680px;
    margin: 16px auto 0;
    padding: 0 16px 32px;
  }
  .country-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .country-header {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    transition: background 0.12s;
  }
  .country-header:hover { background: rgba(255,255,255,0.08); }
  .country-header .match-count {
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .country-venues {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 14px;
  }
  .venue-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.12s;
  }
  .venue-pill:hover { border-color: var(--primary); color: var(--text); }
  .venue-pill .vc-count {
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--text-muted);
  }

  .venue-view {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 48px;
    display: none;
  }
  .venue-hero {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .venue-hero-flag { font-size: 40px; line-height: 1; }
  .venue-hero-info { flex: 1; }
  .venue-hero-name { font-size: 20px; font-weight: 800; line-height: 1; }
  .venue-hero-sub { margin-top: 5px; font-size: 13px; color: var(--text-muted); }
  .back-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--primary); color: var(--text); }

  .all-standings {
    max-width: 680px;
    margin: 16px auto 0;
    padding: 0 16px 48px;
  }
  .standings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .standings-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .standings-group-header {
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .standings-table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .standings-table {
    width: 100%;
    min-width: 360px;
    border-collapse: collapse;
    font-size: 12px;
  }
  .standings-table thead th {
    padding: 5px 8px;
    color: var(--text-muted);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .standings-table thead th.th-team { text-align: left; }
  .standings-table tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }
  .standings-table tbody tr:last-child { border-bottom: none; }
  .standings-table tbody tr:hover { background: var(--surface2); }
  .standings-table td {
    padding: 7px 8px;
    text-align: center;
    color: var(--text-muted);
  }
  .standings-table td.td-team {
    text-align: left;
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .standings-table td.td-pos { font-weight: 700; color: var(--text-muted); width: 24px; }
  .standings-table td.td-pts { font-weight: 800; color: var(--text); }
  .standings-table tbody tr.advances td { color: var(--text); }
  .standings-table tbody tr.advances td.td-pts { color: var(--gold); }
  .standings-table tbody tr.advances-bar td:first-child {

// Resolve the winner (or loser) of a match, returning a team code or null.
// Uses SCORES for all matches (group stage + knockout, keyed by match id).
// For knockout matches with home/away codes already set, reads from ALL_KO_MATCHES.
function resolveMatch(matchId, wantLoser) {
  const allMatches = [...MATCHES, ...KNOCKOUT_MATCHES];
  const m = allMatches.find(x => x.id === matchId);
  if (!m) return null;

  // Get home/away codes: either directly on the match or recursively resolved
  const homeCode = m.home || (BRACKET_FEEDS[matchId] ? resolveMatch(BRACKET_FEEDS[matchId].home, BRACKET_FEEDS[matchId].homeLoser) : null);
  const awayCode = m.away || (BRACKET_FEEDS[matchId] ? resolveMatch(BRACKET_FEEDS[matchId].away, BRACKET_FEEDS[matchId].awayLoser) : null);
  if (!homeCode || !awayCode) return null;

  const score = SCORES[matchId];
  if (!score || !score.completed) return null;

  // Use homeWins flag (set by ESPN's winner field, handles penalty shootouts)
  const homeWon = score.homeWins;
  if (wantLoser) return homeWon ? awayCode : homeCode;
  return homeWon ? homeCode : awayCode;
}

// Resolve both sides of a match for display (returns { homeCode, awayCode } or nulls)
function resolveMatchSides(matchId) {
  const feed = BRACKET_FEEDS[matchId];
  if (!feed) return { homeCode: null, awayCode: null };
  return {
    homeCode: resolveMatch(feed.home, feed.homeLoser),
    awayCode: resolveMatch(feed.away, feed.awayLoser),
  };
}

function getDisplayTime(match) {
  if (!showLocalTime) {
    return { time: match.time === "00:00" ? "Midnight" : match.time, tz: "ET" };
  }
  const tz = VENUE_TZ[match.venue] || { offset: 0, label: "ET" };
  const [hStr, mStr] = match.time.split(":");
  let h = parseInt(hStr) + tz.offset;
  const m = mStr;
  if (h < 0) h += 24;
  if (h >= 24) h -= 24;
  return { time: `${String(h).padStart(2,'0')}:${m}`, tz: tz.label };
}

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── SCORES FETCH ──────────────────────────────────────────────────────────────
async function fetchScores() {
  const start = new Date('2026-06-11');
  const today = new Date();
  const end   = new Date(Math.min(today.getTime(), new Date('2026-07-19').getTime()));

  const dates = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    dates.push(d.toISOString().slice(0, 10).replace(/-/g, ''));
  }

  // Build a lookup of all matchable fixtures: static codes (group + R32) + dynamically resolved (R16+)
  function buildCodedMatches() {
    const coded = [
      ...MATCHES,
      ...KNOCKOUT_MATCHES.filter(m => m.home && m.away),
    ];
    // Add dynamically-resolved R16+ matches
    KNOCKOUT_MATCHES.filter(m => !m.home || !m.away).forEach(m => {
      const { homeCode, awayCode } = resolveMatchSides(m.id);
      if (homeCode && awayCode) {
        coded.push({ ...m, home: homeCode, away: awayCode });
      }
    });
    return coded;
  }

  const results = await Promise.all(
    dates.map(date =>
      fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${date}`)
        .then(r => r.json())
        .catch(() => null)
    )
  );

  // Two-pass: first populate group + R32 scores, then rebuild coded list with resolved teams
  // and do a second pass for R16+ scores (they depend on R32 results being in SCORES first)
  function processEvents(allResults, codedMatches) {
    allResults.forEach(data => {
      if (!data || !data.events) return;
      data.events.forEach(event => {
        const parts = (event.shortName || '').split(' @ ');
        if (parts.length !== 2) return;
        const [awayAbbr, homeAbbr] = parts;
        const homeCode = ESPN_TO_CODE[homeAbbr.toUpperCase()] || homeAbbr.toUpperCase();
        const awayCode = ESPN_TO_CODE[awayAbbr.toUpperCase()] || awayAbbr.toUpperCase();
        const match    = codedMatches.find(m => m.home === homeCode && m.away === awayCode);
        if (!match) return;
        const comp = event.competitions?.[0];
        if (!comp || !comp.competitors) return;
        const home       = comp.competitors.find(t => t.homeAway === 'home');
        const away       = comp.competitors.find(t => t.homeAway === 'away');
        const completed  = event.status?.type?.completed || false;
        const inProgress = event.status?.type?.state === 'in';
        if (!completed && !inProgress) return;
        // ESPN marks the actual winner via competitor.winner=true, which handles penalties
        const homeWinner = home?.winner === true;
        const awayWinner = away?.winner === true;
        SCORES[match.id] = {
          homeScore: home ? parseInt(home.score) || 0 : 0,
          awayScore: away ? parseInt(away.score) || 0 : 0,
          // If ESPN declares a winner (handles pens), use that; else infer from score
          homeWins: homeWinner || (!awayWinner && (home ? parseInt(home.score) || 0 : 0) > (away ? parseInt(away.score) || 0 : 0)),
          completed, inProgress,
          detail: event.status?.type?.shortDetail || 'FT',
        };
      });
    });
  }

  // Pass 1: group stage + R32 (static codes)
  processEvents(results, [...MATCHES, ...KNOCKOUT_MATCHES.filter(m => m.home && m.away)]);
  // Pass 2: R16+ with resolved teams (now that R32 scores are in SCORES)
  processEvents(results, buildCodedMatches());
}

// ── STANDINGS ─────────────────────────────────────────────────────────────────
function computeStandings(group) {
  const teamCodes = Object.entries(TEAMS)
    .filter(([, t]) => t.group === group)
    .map(([code]) => code);

  const stats = {};
  teamCodes.forEach(code => {
    stats[code] = { p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 };
  });

  MATCHES.filter(m => m.group === group).forEach(m => {
    const score = SCORES[m.id];
    if (!score || !score.completed) return;
    const { homeScore: hg, awayScore: ag } = score;
    stats[m.home].p++; stats[m.away].p++;
    stats[m.home].gf += hg; stats[m.home].ga += ag;
    stats[m.away].gf += ag; stats[m.away].ga += hg;
    if (hg > ag)      { stats[m.home].w++; stats[m.home].pts += 3; stats[m.away].l++; }
    else if (hg < ag) { stats[m.away].w++; stats[m.away].pts += 3; stats[m.home].l++; }
    else              { stats[m.home].d++; stats[m.home].pts++; stats[m.away].d++; stats[m.away].pts++; }
  });

  return teamCodes
    .map(code => ({ code, ...stats[code], gd: stats[code].gf - stats[code].ga }))
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
}

function renderStandingsTable(group, highlightCode = null) {
  const rows  = computeStandings(group);
  const color = GROUP_COLORS[group];

  const tbody = rows.map((r, i) => {
    const team     = TEAMS[r.code];
    const advances = i < 2 ? 'advances advances-bar' : '';
    const selected = r.code === highlightCode ? 'is-selected' : '';
    const gd       = r.gd > 0 ? `+${r.gd}` : r.gd;
    return `
      <tr class="${advances} ${selected}">
        <td class="td-pos">${i + 1}</td>
        <td class="td-team" onclick="selectTeam('${r.code}')">
          <span class="td-flag">${team.flag}</span>${team.name}
        </td>
        <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${r.gf}</td><td>${r.ga}</td><td>${gd}</td>
        <td class="td-pts">${r.pts}</td>
      </tr>`;
  }).join('');

  return `
    <div class="standings-card">
      <div class="standings-group-header" style="background:${color}22; color:#cde; border-bottom:1px solid ${color}44;">
        GROUP ${group}
      </div>
      <div class="standings-table-scroll">
      <table class="standings-table">
        <thead>
          <tr>
            <th class="td-pos">#</th>
            <th class="th-team" colspan="1">Team</th>
            <th>P</th><th>W</th><th>D</th><th>L</th>
            <th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
      </div>
    </div>`;
}

  const grid = document.getElementById('standingsGrid');

  } else if (mode === 'bracket') {
    document.getElementById('allBracketView').style.display = 'block';

  } else if (mode === 'standings') {
    document.getElementById('allStandingsView').style.display = 'block';

      const group = TEAMS[selectedTeam].group;
      setTimeout(() => {

function allMatchesAtVenue(venue) {
  return [
    ...MATCHES.filter(m => m.venue === venue),
    ...KNOCKOUT_MATCHES.filter(m => m.venue === venue),
  ].sort((a, b) => a.id - b.id);
}

function allMatchesInCities(cities) {
  return [
    ...MATCHES.filter(m => cities.includes(m.venue)),
    ...KNOCKOUT_MATCHES.filter(m => cities.includes(m.venue)),
  ].sort((a, b) => a.id - b.id);
}

function renderVenueBrowser() {

// ── Knockout card renderer ────────────────────────────────────────────────────
function renderKnockoutCard(m) {
  const stageLabel = KO_STAGE_LABELS[m.stage] || m.stage;
  const badgeClass = `badge-${m.stage}`;
  const { time: displayTime, tz: displayTZ } = getDisplayTime(m);
  const venueStr = `📍 ${m.venue}${m.stadium ? ' · ' + m.stadium : ''}`;
  const todayAttr = m.date === getTodayStr() ? ' data-today="true"' : '';

  // ── Teams known (home/away codes on the match object) ─────────────────────
  if (m.home && m.away && TEAMS[m.home] && TEAMS[m.away]) {
    const home  = TEAMS[m.home];
    const away  = TEAMS[m.away];
    const score = SCORES[m.id];

    if (score && (score.completed || score.inProgress)) {
      const homeWin   = score.homeScore > score.awayScore;
      const awayWin   = score.awayScore > score.homeScore;
      const detColor  = score.inProgress ? '#f87171' : 'var(--text-muted)';
      return `
        <div class="match-card finished"${todayAttr} data-home="${m.home}" data-away="${m.away}" data-date="${m.date}">
          <div class="match-meta-bar" style="background:rgba(255,255,255,0.04);">
            <span class="match-num">Match #${m.id}</span>
            <span class="match-stage-badge ${badgeClass}">${stageLabel}</span>
          </div>
          <div class="match-body">
            <div class="match-team${score.completed && homeWin ? ' winner' : ''}">
              <span class="match-team-flag">${home.flag}</span>
              <span class="match-team-name">${home.name}</span>
              <span class="match-team-code">${m.home}</span>
            </div>
            <div class="match-vs">
              <span class="vs-score">${score.homeScore} – ${score.awayScore}</span>
              <span class="vs-ft" style="color:${detColor};">${score.detail}</span>
            </div>
            <div class="match-team${score.completed && awayWin ? ' winner' : ''}">
              <span class="match-team-flag">${away.flag}</span>
              <span class="match-team-name">${away.name}</span>
              <span class="match-team-code">${m.away}</span>
            </div>
          </div>
          <div class="match-footer">
            <span>📅 ${m.date} &nbsp;·&nbsp; ${venueStr}</span>
          </div>
        </div>`;
    }

    return `
      <div class="match-card"${todayAttr} data-home="${m.home}" data-away="${m.away}" data-date="${m.date}">
        <div class="match-meta-bar" style="background:rgba(255,255,255,0.04);">
          <span class="match-num">Match #${m.id}</span>
          <span class="match-stage-badge ${badgeClass}">${stageLabel}</span>
        </div>
        <div class="match-body">
          <div class="match-team">
            <span class="match-team-flag">${home.flag}</span>
            <span class="match-team-name">${home.name}</span>
            <span class="match-team-code">${m.home}</span>
          </div>
          <div class="match-vs">
            <span class="vs-text">vs</span>
            <span class="vs-time">${displayTime}</span>
            <span class="vs-tz">${displayTZ}</span>
          </div>
          <div class="match-team">
            <span class="match-team-flag">${away.flag}</span>
            <span class="match-team-name">${away.name}</span>
            <span class="match-team-code">${m.away}</span>
          </div>
        </div>
        <div class="match-footer">
          <span>📅 ${m.date} &nbsp;·&nbsp; ${venueStr}</span>
        </div>
      </div>`;
  }

  // ── Teams not yet determined — try to resolve from bracket tree ─────────────
  const { homeCode: resolvedHome, awayCode: resolvedAway } = resolveMatchSides(m.id);
  const homeT = resolvedHome ? TEAMS[resolvedHome] : null;
  const awayT = resolvedAway ? TEAMS[resolvedAway] : null;

  // If we resolved both teams, render as a real match card (with score if played)
  if (homeT && awayT) {
    const score = SCORES[m.id];
    if (score && (score.completed || score.inProgress)) {
      const homeWin  = score.homeScore > score.awayScore;
      const awayWin  = score.awayScore > score.homeScore;
      const detColor = score.inProgress ? '#f87171' : 'var(--text-muted)';
      return `
        <div class="match-card finished"${todayAttr} data-home="${resolvedHome}" data-away="${resolvedAway}" data-date="${m.date}">
          <div class="match-meta-bar" style="background:rgba(255,255,255,0.04);">
            <span class="match-num">Match #${m.id}</span>
            <span class="match-stage-badge ${badgeClass}">${stageLabel}</span>
          </div>
          <div class="match-body">
            <div class="match-team${score.completed && homeWin ? ' winner' : ''}">
              <span class="match-team-flag">${homeT.flag}</span>
              <span class="match-team-name">${homeT.name}</span>
              <span class="match-team-code">${resolvedHome}</span>
            </div>
            <div class="match-vs">
              <span class="vs-score">${score.homeScore} – ${score.awayScore}</span>
              <span class="vs-ft" style="color:${detColor};">${score.detail}</span>
            </div>
            <div class="match-team${score.completed && awayWin ? ' winner' : ''}">
              <span class="match-team-flag">${awayT.flag}</span>
              <span class="match-team-name">${awayT.name}</span>
              <span class="match-team-code">${resolvedAway}</span>
            </div>
          </div>
          <div class="match-footer">
            <span>📅 ${m.date} &nbsp;·&nbsp; ${venueStr}</span>
          </div>
        </div>`;
    }
    return `
      <div class="match-card"${todayAttr} data-home="${resolvedHome}" data-away="${resolvedAway}" data-date="${m.date}">
        <div class="match-meta-bar" style="background:rgba(255,255,255,0.04);">
          <span class="match-num">Match #${m.id}</span>
          <span class="match-stage-badge ${badgeClass}">${stageLabel}</span>
        </div>
        <div class="match-body">
          <div class="match-team">
            <span class="match-team-flag">${homeT.flag}</span>
            <span class="match-team-name">${homeT.name}</span>
            <span class="match-team-code">${resolvedHome}</span>
          </div>
          <div class="match-vs">
            <span class="vs-text">vs</span>
            <span class="vs-time">${displayTime}</span>
            <span class="vs-tz">${displayTZ}</span>
          </div>
          <div class="match-team">
            <span class="match-team-flag">${awayT.flag}</span>
            <span class="match-team-name">${awayT.name}</span>
            <span class="match-team-code">${resolvedAway}</span>
          </div>
        </div>
        <div class="match-footer">
          <span>📅 ${m.date} &nbsp;·&nbsp; ${venueStr}</span>
        </div>
      </div>`;
  }

  // Partially resolved — show one team if known, TBD for the other
  const homePart = homeT
    ? `<div class="match-team"><span class="match-team-flag">${homeT.flag}</span><span class="match-team-name">${homeT.name}</span><span class="match-team-code">${resolvedHome}</span></div>`
    : `<div class="match-team"><span class="match-team-tbd">🏳️</span><span class="match-team-name" style="color:var(--text-muted);">${m.homeLabel || 'TBD'}</span></div>`;
  const awayPart = awayT
    ? `<div class="match-team"><span class="match-team-flag">${awayT.flag}</span><span class="match-team-name">${awayT.name}</span><span class="match-team-code">${resolvedAway}</span></div>`
    : `<div class="match-team"><span class="match-team-tbd">🏳️</span><span class="match-team-name" style="color:var(--text-muted);">${m.awayLabel || 'TBD'}</span></div>`;

  return `
    <div class="match-card"${todayAttr}>
      <div class="match-meta-bar" style="background:rgba(255,255,255,0.04);">
        <span class="match-num">Match #${m.id}</span>
        <span class="match-stage-badge ${badgeClass}">${stageLabel}</span>
      </div>
      <div class="match-body">
        ${homePart}
        <div class="match-vs">
          <span class="vs-text">vs</span>
          <span class="vs-time">${displayTime}</span>
          <span class="vs-tz">${displayTZ}</span>
        </div>
        ${awayPart}
      </div>
      <div class="match-footer">
        <span>📅 ${m.date} &nbsp;·&nbsp; ${venueStr}</span>
      </div>
    </div>`;
}

// ── Today string ──────────────────────────────────────────────────────────────
function getTodayStr() {
  const now    = new Date();
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()}`;
}

// ── Full chronological schedule ───────────────────────────────────────────────
function renderFullSchedule() {
  const el       = document.getElementById('scheduleGroups');
  const todayStr = getTodayStr();

  const dateMap = new Map();
  MATCHES.forEach(m => {
    if (!dateMap.has(m.date)) dateMap.set(m.date, []);
    dateMap.get(m.date).push(m);
  });

  function parseDateStr(s) {
    const p = s.split(' ');
    return new Date(2026, MONTHS_SHORT.indexOf(p[1]), parseInt(p[2]));
  }

  const toMins = t => { const [h,m] = t.split(':').map(Number); return h === 0 ? 1440 : h * 60 + m; };

  let html = [...dateMap.entries()]
    .sort(([a], [b]) => parseDateStr(a) - parseDateStr(b))
    .map(([date, matches]) => {
      const isToday = date === todayStr;
      return `
        <div class="schedule-date-header${isToday ? ' today' : ''}"${isToday ? ' id="today-anchor"' : ''}>${date}${isToday ? '<span class="today-pill">Today</span>' : ''}</div>
        ${[...matches].sort((a,b) => toMins(a.time) - toMins(b.time)).map(m => renderMatchCard(m, null)).join('')}
      `;
    }).join('');

  html += `<div class="schedule-phase-sep">Knockout Stage</div>`;

  const koRounds = [
    { key:"r32",   label:"Round of 32",         dates:"Jun 28 – Jul 4" },
    { key:"r16",   label:"Round of 16",          dates:"Jul 4 – 7"      },
    { key:"qf",    label:"Quarter-finals",        dates:"Jul 9 – 11"     },
    { key:"sf",    label:"Semi-finals",           dates:"Jul 14 – 15"    },
    { key:"3rd",   label:"Third Place Play-off",  dates:"Jul 18"         },
    { key:"final", label:"The Final",             dates:"Jul 19"         },
  ];

  html += koRounds.map(r => {
    const matches = KNOCKOUT_MATCHES.filter(m => m.stage === r.key);
    const dayGroups = new Map();
    matches.forEach(m => {
      if (!dayGroups.has(m.date)) dayGroups.set(m.date, []);
      dayGroups.get(m.date).push(m);
    });
    const innerHtml = [...dayGroups.entries()].map(([date, dms]) => {
      const isToday = date === todayStr;
      return `
        <div class="schedule-date-header${isToday ? ' today' : ''}">${date}${isToday ? '<span class="today-pill">Today</span>' : ''}</div>
        ${dms.sort((a,b) => toMins(a.time) - toMins(b.time)).map(m => renderKnockoutCard(m)).join('')}
      `;
    }).join('');
    return `<div class="ko-round-header">${r.label}<span style="font-size:10px;font-weight:500;color:var(--text-muted);margin-left:6px;">${r.dates}</span></div>${innerHtml}`;
  }).join('');

  el.innerHTML = html;
  stampTeamNextAnchors();
}

// After rendering the full schedule, mark the first upcoming card per team
// with data-team-next="CODE" so selectTeam can scroll to it instantly.
function stampTeamNextAnchors() {
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const seen = new Set();
  // Walk all match cards in DOM order (already chronological)
  document.querySelectorAll('#scheduleGroups .match-card[data-date]').forEach(card => {
    const dateStr = card.dataset.date;
    if (!dateStr) return;
    const cardDate = parseTournamentDate(dateStr);
    if (cardDate < now) return; // past
    const home = card.dataset.home;
    const away = card.dataset.away;
    if (home && !seen.has(home)) { card.setAttribute('data-team-next', home); seen.add(home); }
    if (away && !seen.has(away)) { card.setAttribute('data-team-next', away); seen.add(away); }
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────

// ── Bracket renderer ──────────────────────────────────────────────────────────
function drawBracket() {
  const canvas  = document.getElementById('bracketCanvas');
  const ctx     = canvas.getContext('2d');
  const isDark  = true; // always dark theme

  // Layout constants
  const CARD_W   = 130;
  const CARD_H   = 46;
  const GAP_Y    = 10;   // gap between match cards within a round
  const COL_W    = 160;  // horizontal spacing between rounds
  const PAD_X    = 12;
  const PAD_Y    = 20;

  // Rounds, left half of bracket (matches 73-80, then 89/90, 91/92... )
  // We'll lay out two "sides" top-to-bottom in the same column structure.
  // Full bracket structure:
  // Col 0 (R32):  16 matches stacked (matches 73-88 in bracket order)
  // Col 1 (R16):   8 matches
  // Col 2 (QF):    4 matches
  // Col 3 (SF):    2 matches
  // Col 4 (Final): 1 match (center)
  // 3rd place: below Final

  // Bracket order for R32 (top to bottom, pairs that feed R16):
  // Pair 1 → R16 M90: M73, M75
  // Pair 2 → R16 M89: M74, M77
  // Pair 3 → R16 M91: M76, M78
  // Pair 4 → R16 M92: M79, M80
  // Pair 5 → R16 M93: M83, M84
  // Pair 6 → R16 M94: M81, M82
  // Pair 7 → R16 M95: M86, M88
  // Pair 8 → R16 M96: M85, M87

  const R32_ORDER = [73, 75, 74, 77, 83, 84, 81, 82, 76, 78, 79, 80, 86, 88, 85, 87];
  const R16_ORDER = [90, 89, 93, 94, 91, 92, 95, 96];
  const QF_ORDER  = [97, 98, 99, 100];
  const SF_ORDER  = [101, 102];
  const FINAL_ORDER = [104];
  const THIRD_ORDER = [103];

  // Calculate total height based on R32 (16 matches)
  const totalMatchesPerCol = 16;
  const slotH = CARD_H + GAP_Y;
  const totalH = totalMatchesPerCol * slotH + PAD_Y * 2 + 60; // +60 for 3rd place
  const totalW = PAD_X * 2 + COL_W * 5;

  // DPR for crisp rendering
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = totalW * dpr;
  canvas.height = totalH * dpr;
  canvas.style.width  = totalW + 'px';
  canvas.style.height = totalH + 'px';
  ctx.scale(dpr, dpr);

  // Colors
  const COL_BG       = '#131c2e';
  const COL_CARD     = '#1a2540';
  const COL_BORDER   = '#243050';
  const COL_TEXT     = '#eef2ff';
  const COL_MUTED    = '#7a90b8';
  const COL_GOLD     = '#e8c44a';
  const COL_WIN      = '#1a6fc4';
  const COL_LINE     = '#243050';
  const COL_LIVE     = '#f87171';
  const COL_ELIM     = '#0f1825';

  ctx.fillStyle = COL_BG;
  ctx.fillRect(0, 0, totalW, totalH);

  // Get team display info (flag char + short name)
  function teamInfo(code) {
    if (!code) return { flag: '🏳', name: 'TBD', muted: true };
    const t = TEAMS[code];
    if (!t) return { flag: '🏳', name: code, muted: false };
    // Shorten long names
    let name = t.name;
    const SHORT = {
      'Korea Republic': 'Korea Rep.',
      'Bosnia & Herzegovina': 'Bosnia',
      'Saudi Arabia': 'S. Arabia',
      'Cabo Verde': 'C. Verde',
      'Congo DR': 'Congo DR',
      "Côte d'Ivoire": "Côte d'I.",
      'New Zealand': 'N. Zealand',
      'Türkiye': 'Türkiye',
      'Netherlands': 'Neths.',
    };
    name = SHORT[name] || name;
    if (name.length > 11) name = name.slice(0, 10) + '.';
    return { flag: t.flag, name, muted: false };
  }

  // Get score/status for a match
  function matchScore(matchId) {
    return SCORES[matchId] || null;
  }

  // Resolve teams for any match (uses BRACKET_FEEDS recursively)
  function getTeams(matchId) {
    const km = KNOCKOUT_MATCHES.find(m => m.id === matchId);
    if (km && km.home && km.away) {
      return { home: km.home, away: km.away };
    }
    const { homeCode, awayCode } = resolveMatchSides(matchId);
    return { home: homeCode, away: awayCode };
  }

  // Determine winner code of a match
  function winnerOf(matchId) {
    return resolveMatch(matchId, false);
  }

  // Draw a match card at (x, y)
  function drawCard(matchId, x, y, highlightCode) {
    const { home, away } = getTeams(matchId);
    const score = matchScore(matchId);
    const winner = score && score.completed ? winnerOf(matchId) : null;

    const hi  = teamInfo(home);
    const ai  = teamInfo(away);

    const homeElim = winner && winner !== home;
    const awayElim = winner && winner !== away;
    const isLive   = score && score.inProgress;

    // Card background
    const isHighlightMatch = highlightCode && (home === highlightCode || away === highlightCode);
    ctx.fillStyle = COL_CARD;
    ctx.strokeStyle = isHighlightMatch ? COL_GOLD : (isLive ? COL_LIVE : COL_BORDER);
    ctx.lineWidth = isHighlightMatch || isLive ? 1.5 : 0.75;
    roundRect(ctx, x, y, CARD_W, CARD_H, 5);
    ctx.fill();
    ctx.stroke();

    // Divider between home and away
    ctx.strokeStyle = COL_BORDER;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x + 1, y + CARD_H / 2);
    ctx.lineTo(x + CARD_W - 1, y + CARD_H / 2);
    ctx.stroke();

    const rowH = CARD_H / 2;

    // Draw each team row
    [[home, hi, homeElim, score?.homeScore, y],
     [away, ai, awayElim, score?.awayScore, y + rowH]].forEach(([code, info, elim, sc, ry]) => {
      const isWin = winner && winner === code;

      // Winner highlight bar
      if (isWin) {
        ctx.fillStyle = 'rgba(26,111,196,0.15)';
        ctx.fillRect(x + 1, ry + 0.5, CARD_W - 2, rowH - 0.5);
      }

      // Flag (emoji)
      ctx.font = '13px sans-serif';
      ctx.fillStyle = elim ? COL_MUTED : COL_TEXT;
      ctx.textBaseline = 'middle';
      ctx.fillText(info.flag, x + 5, ry + rowH / 2);

      // Name
      ctx.font = `${isWin ? '600 ' : ''}10px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.fillStyle = elim ? '#3a4f6a' : (isWin ? COL_TEXT : (info.muted ? COL_MUTED : COL_TEXT));
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText(info.name, x + 22, ry + rowH / 2);

      // Score
      if (sc !== undefined && sc !== null && (score.completed || score.inProgress)) {
        ctx.textAlign = 'right';
        ctx.font = `${isWin ? '700 ' : ''}10px -apple-system, BlinkMacSystemFont, sans-serif`;
        ctx.fillStyle = isLive ? COL_LIVE : (isWin ? COL_GOLD : (elim ? '#3a4f6a' : COL_MUTED));
        ctx.fillText(String(sc), x + CARD_W - 5, ry + rowH / 2);
      }
      ctx.textAlign = 'left';
    });
  }

  // Draw date/time label below a card (for R16 → Final)
  function drawTimeLabel(matchId, x, y) {
    const km = KNOCKOUT_MATCHES.find(m => m.id === matchId);
    if (!km) return;
    const { time: displayTime, tz } = getDisplayTime(km);
    // e.g. "Sat Jul 4 · 1:00 PM ET"
    const dateParts = km.date.split(' '); // ["Sat","Jul","4"]
    const dayStr  = dateParts[0] + ' ' + dateParts[1] + ' ' + dateParts[2];
    // Convert "13:00" → "1:00 PM"
    const [hh, mm] = displayTime.split(':').map(Number);
    const ampm  = hh >= 12 ? 'PM' : 'AM';
    const h12   = hh % 12 || 12;
    const timeStr = `${h12}:${String(mm).padStart(2,'0')} ${ampm} ${tz}`;
    const label = `${dayStr}  ·  ${timeStr}`;
    ctx.font = '8.5px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillStyle = COL_MUTED;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(label, x + CARD_W / 2, y + CARD_H + 3);
  }

  // Draw connector line from right edge of a card to left edge of next round card
  function drawConnector(fromX, fromY, fromH, toX, toY, toH) {
    const x1 = fromX + CARD_W;
    const y1 = fromY + fromH / 2;
    const x2 = toX;
    const y2 = toY + toH / 2;
    const mx = (x1 + x2) / 2;

    ctx.strokeStyle = COL_LINE;
    ctx.lineWidth = 0.75;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(mx, y1);
    ctx.lineTo(mx, y2);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // Compute y-center for a match in a given round column
  // Round 0 (R32): 16 slots, each slot = CARD_H + GAP_Y
  // Round n: slots are 2x taller than round n-1
  function slotCenterY(round, idx) {
    const slots0H = CARD_H + GAP_Y;
    const slotH_r = slots0H * Math.pow(2, round);
    return PAD_Y + idx * slotH_r + slotH_r / 2;
  }

  function cardY(round, idx) {
    return slotCenterY(round, idx) - CARD_H / 2;
  }

  function cardX(col) {
    return PAD_X + col * COL_W;
  }

  // Draw round labels
  const roundLabels = ['R32', 'R16', 'QF', 'SF', 'Final'];
  roundLabels.forEach((label, col) => {
    ctx.font = '700 10px -apple-system, sans-serif';
    ctx.fillStyle = COL_MUTED;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(label, cardX(col) + CARD_W / 2, 4);
  });

  // Draw R32
  R32_ORDER.forEach((matchId, i) => {
    drawCard(matchId, cardX(0), cardY(0, i), selectedTeam);
  });

  // Draw R16 + connectors from R32
  // R16 match i feeds from R32 matches at positions i*2 and i*2+1
  R16_ORDER.forEach((matchId, i) => {
    const x = cardX(1);
    const y = cardY(1, i);
    drawCard(matchId, x, y, selectedTeam);
    drawTimeLabel(matchId, x, y);
    // Draw connectors from the two R32 feeder slots
    drawConnector(cardX(0), cardY(0, i * 2),     CARD_H, x, y, CARD_H);
    drawConnector(cardX(0), cardY(0, i * 2 + 1), CARD_H, x, y, CARD_H);
  });

  // Draw QF + connectors from R16
  QF_ORDER.forEach((matchId, i) => {
    const x = cardX(2);
    const y = cardY(2, i);
    drawCard(matchId, x, y, selectedTeam);
    drawTimeLabel(matchId, x, y);
    drawConnector(cardX(1), cardY(1, i * 2),     CARD_H, x, y, CARD_H);
    drawConnector(cardX(1), cardY(1, i * 2 + 1), CARD_H, x, y, CARD_H);
  });

  // Draw SF + connectors from QF
  SF_ORDER.forEach((matchId, i) => {
    const x = cardX(3);
    const y = cardY(3, i);
    drawCard(matchId, x, y, selectedTeam);
    drawTimeLabel(matchId, x, y);
    drawConnector(cardX(2), cardY(2, i * 2),     CARD_H, x, y, CARD_H);
    drawConnector(cardX(2), cardY(2, i * 2 + 1), CARD_H, x, y, CARD_H);
  });

  // Draw Final + connectors from SF
  const finalX = cardX(4);
  const finalY = cardY(4, 0);
  drawCard(104, finalX, finalY, selectedTeam);
  drawTimeLabel(104, finalX, finalY);
  SF_ORDER.forEach((_, i) => {
    drawConnector(cardX(3), cardY(3, i), CARD_H, finalX, finalY, CARD_H);
  });

  // Draw Final label / trophy
  ctx.font = '12px sans-serif';
  ctx.fillStyle = COL_GOLD;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏆', cardX(4) + CARD_W / 2, cardY(4, 0) - 10);

  // Draw 3rd place below the two SFs
  const thirdY = totalH - 60 - CARD_H;
  const thirdX = cardX(3);
  ctx.font = '700 9px -apple-system, sans-serif';
  ctx.fillStyle = COL_MUTED;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('3rd Place', thirdX, thirdY - 13);
  drawCard(103, thirdX, thirdY, selectedTeam);
  drawTimeLabel(103, thirdX, thirdY);
}

async function init() {
  await fetchScores();
  renderFullSchedule();
  renderVenueBrowser();
  renderAllStandings(null);

  scrollToToday();

  const inp = document.getElementById('searchInput');
  inp.addEventListener('input', onSearchInput);
  inp.addEventListener('keydown', onSearchKeydown);
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-input-wrap')) hideAutocomplete();
  });
}

// ── Search / Autocomplete ─────────────────────────────────────────────────────
let acIndex = -1;

function onSearchInput(e) {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { hideAutocomplete(); return; }
  const matches = Object.entries(TEAMS).filter(([code, t]) =>
    t.name.toLowerCase().includes(q) || code.toLowerCase().includes(q)
  );
  if (!matches.length) { hideAutocomplete(); return; }
  acIndex = -1;
  const list = document.getElementById('autocompleteList');
  list.innerHTML = matches.map(([code, t]) => `
    <div class="autocomplete-item" data-code="${code}" onclick="selectTeam('${code}')">
      <span class="team-flag">${t.flag}</span>
      <span class="team-name">${t.name}</span>
      <span class="group-tag">Group ${t.group}</span>
      <span class="team-code">${code}</span>
    </div>
  `).join('');
  list.style.display = 'block';
}

function onSearchKeydown(e) {
  const list  = document.getElementById('autocompleteList');
  const items = list.querySelectorAll('.autocomplete-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex+1, items.length-1); highlightAC(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex-1, 0); highlightAC(items); }
  else if (e.key === 'Enter' && acIndex >= 0) { items[acIndex].click(); }
  else if (e.key === 'Escape') { hideAutocomplete(); }
}

function highlightAC(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
  if (acIndex >= 0) items[acIndex].scrollIntoView({ block:'nearest' });
}

function hideAutocomplete() {
  document.getElementById('autocompleteList').style.display = 'none';
}

// ── Scroll to today helper ───────────────────────────────────────────────────
function scrollToToday() {
  setTimeout(() => {
    const stickyH = document.querySelector('.sticky-top').offsetHeight;
    // Only search within the currently visible top-level view
    const visibleView = [...document.querySelectorAll(
      '#allScheduleView, #allVenuesView, #venueView, #allStandingsView'
    )].find(el => el.style.display !== 'none');
    const scope  = visibleView || document;
    const anchor = scope.querySelector('[data-today="true"], #today-anchor');
    if (!anchor) { window.scrollTo({ top: 0 }); return; }
    const top = anchor.getBoundingClientRect().top + window.scrollY - stickyH - 8;
    window.scrollTo({ top, behavior: 'smooth' });
  }, 80);
}

// ── Select team ───────────────────────────────────────────────────────────────
function scrollToTeam(code) {
  setTimeout(() => {
    const stickyH = document.querySelector('.sticky-top').offsetHeight;
    const now = new Date(); now.setHours(0, 0, 0, 0);
    const cards = [...document.querySelectorAll('#scheduleGroups .match-card[data-date]')];
    console.log('[scrollToTeam]', code, 'total cards with data-date:', cards.length);
    const upcoming = cards.filter(c => parseTournamentDate(c.dataset.date) >= now);
    console.log('[scrollToTeam] upcoming cards:', upcoming.length);
    const teamCards = upcoming.filter(c => c.dataset.home === code || c.dataset.away === code);
    console.log('[scrollToTeam] cards for team:', teamCards.length, teamCards.map(c => c.dataset.date + ' ' + c.dataset.home + 'v' + c.dataset.away));
    const anchor = teamCards[0];
    if (!anchor) { scrollToToday(); return; }
    const top = anchor.getBoundingClientRect().top + window.scrollY - stickyH - 8;
    console.log('[scrollToTeam] scrolling to top:', top);
    window.scrollTo({ top, behavior: 'smooth' });
  }, 80);
}

function selectTeam(code) {
  hideAutocomplete();
  selectedTeam  = code;
  selectedVenue = null;
  const team = TEAMS[code];
  document.getElementById('searchInput').value = team.name;
  document.getElementById('clearBtn').classList.add('visible');
  if (currentMode !== 'all') switchMode('all');
  else scrollToTeam(code);
}

function clearSelection() {
  selectedTeam = null;
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  scrollToToday();
}

// Returns a Date object for strings like "Thu Jun 11" or "Mon Jun 29" (always 2026)
function parseTournamentDate(dateStr) {
  const parts = dateStr.split(' ');
  const mo = MONTHS_SHORT.indexOf(parts[1]);
  return new Date(2026, mo, parseInt(parts[2]));
}


// ── Group stage match card ────────────────────────────────────────────────────
function renderMatchCard(m, highlightCode) {
  const home  = TEAMS[m.home];
  const away  = TEAMS[m.away];
  const color = GROUP_COLORS[m.group];
  const score = SCORES[m.id];
  const { time: displayTime, tz: displayTZ } = getDisplayTime(m);
  const todayAttr = m.date === getTodayStr() ? ' data-today="true"' : '';

  if (score && (score.completed || score.inProgress)) {
    const homeWin   = score.homeWins;
    const awayWin   = !score.homeWins && score.homeScore !== score.awayScore;
    const detColor  = score.inProgress ? '#f87171' : 'var(--text-muted)';
    const homeWCls  = `match-team ${m.home===highlightCode?'highlight':''} ${score.completed && homeWin?'winner':''}`;
    const awayWCls  = `match-team ${m.away===highlightCode?'highlight':''} ${score.completed && awayWin?'winner':''}`;
    return `
      <div class="match-card finished"${todayAttr} data-home="${m.home}" data-away="${m.away}" data-date="${m.date}">
        <div class="match-meta-bar" style="background:${color}18;">
          <span class="match-num">Match #${m.id} · Matchday ${m.matchday}</span>
          <span class="match-stage-badge badge-group">Group ${m.group}</span>
        </div>
        <div class="match-body">
          <div class="${homeWCls}">
            <span class="match-team-flag">${home.flag}</span>
            <span class="match-team-name">${home.name}</span>
            <span class="match-team-code">${m.home}</span>
          </div>
          <div class="match-vs">
            <span class="vs-score">${score.homeScore} – ${score.awayScore}</span>
            <span class="vs-ft" style="color:${detColor};">${score.detail}</span>
          </div>
          <div class="${awayWCls}">
            <span class="match-team-flag">${away.flag}</span>
            <span class="match-team-name">${away.name}</span>
            <span class="match-team-code">${m.away}</span>
          </div>
        </div>
        <div class="match-footer">
          <span>📅 ${m.date} &nbsp;·&nbsp; 📍 ${m.venue}</span>
          <div class="broadcast-wrap">
            <span class="badge-${m.broadcast === 'FOX' ? 'fox' : 'fs1'}">${m.broadcast}</span>
            ${m.tubi ? '<span class="badge-tubi">Tubi</span>' : ''}
          </div>
        </div>
      </div>`;
  }

  return `
    <div class="match-card"${todayAttr} data-home="${m.home}" data-away="${m.away}" data-date="${m.date}">
      <div class="match-meta-bar" style="background:${color}18;">
        <span class="match-num">Match #${m.id} · Matchday ${m.matchday}</span>
        <span class="match-stage-badge badge-group">Group ${m.group}</span>
      </div>
      <div class="match-body">
        <div class="match-team ${m.home===highlightCode?'highlight':''}">
          <span class="match-team-flag">${home.flag}</span>
          <span class="match-team-name">${home.name}</span>
          <span class="match-team-code">${m.home}</span>
        </div>
        <div class="match-vs">
          <span class="vs-text">vs</span>
          <span class="vs-time">${displayTime}</span>
          <span class="vs-tz">${displayTZ}</span>
        </div>
        <div class="match-team ${m.away===highlightCode?'highlight':''}">
          <span class="match-team-flag">${away.flag}</span>
          <span class="match-team-name">${away.name}</span>
          <span class="match-team-code">${m.away}</span>
        </div>
      </div>
      <div class="match-footer">
        <span>📅 ${m.date} &nbsp;·&nbsp; 📍 ${m.venue}</span>
        <div class="broadcast-wrap">
          <span class="badge-${m.broadcast === 'FOX' ? 'fox' : 'fs1'}">${m.broadcast}</span>
          ${m.tubi ? '<span class="badge-tubi">Tubi</span>' : ''}
        </div>
      </div>
    </div>`;
}

init();
</script>
